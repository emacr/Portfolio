# ─────────────────────────────────────────────────────────────────────────────
# .github/workflows/deploy.yml
# Deploy automático a GitHub Pages en cada push a main.
# ─────────────────────────────────────────────────────────────────────────────
name: Deploy Portfolio to GitHub Pages

on:
  push:
    branches:
      - main
  # Permite ejecutar manualmente desde la UI de GitHub Actions
  workflow_dispatch:

# Permisos necesarios para GitHub Pages
permissions:
  contents: read
  pages:    write
  id-token: write

# Evita deploys concurrentes; cancela el anterior si hay uno en proceso
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # ─── Job 1: Build ────────────────────────────────────────────────────────
  build:
    name: Build Astro Site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Astro type check
        run: npx astro check

      - name: Build static site
        run: npm run build

      - name: Upload build artifact for Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  # ─── Job 2: Deploy ───────────────────────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url:  ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id:   deployment
        uses: actions/deploy-pages@v4
